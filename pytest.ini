[pytest]
# Ignore TestModel in test_onnx_generator.py (it's a PyTorch model, not a test class)
python_classes = Test* !TestModel

# Suppress known warnings
filterwarnings =
    # Ignore PyTorch ONNX deprecation warnings (external dependency)
    ignore::DeprecationWarning:torch.onnx
    # Ignore pytest collection warning for TestModel in test_onnx_generator.py
    ignore::pytest.PytestCollectionWarning
