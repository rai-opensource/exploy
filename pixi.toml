[workspace]
name = "exporter"
version = "0.1.0"
description = "A development environment for a C++ library with Python bindings, integrated with ONNX Runtime and PyTorch."
authors = ["TODO"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
libc = { family = "glibc", version = "2.35" }

[activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
CPATH = "$CONDA_PREFIX/include:$CONDA_PREFIX/include/c++/v1"
LIBRARY_PATH = "$CONDA_PREFIX/lib"
PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig"

# Core dependencies (minimal base)
[dependencies]
git = "*"
pip = "*"

# FEATURE: Python Development - Python tools, linting, formatting, testing
[feature.python.dependencies]
python = "3.11.*"
onnxscript = "*"
pybind11 = ">=2.10"
ruff = "*"
pre-commit = "*"

[feature.python.pypi-dependencies]
exploy-exporter-core = { path = "./exploy/exporter/core", editable = true }
build = "*"

[feature.python.tasks]
# Python linting and formatting
lint-python = "ruff check ."
lint-python-fix = "ruff check --fix ."
format-python = "ruff format ."
format-python-check = "ruff format --check ."
lint = { depends-on = ["lint-python"] }
format = { depends-on = ["format-python"] }
check = { depends-on = ["lint", "format"] }

# FEATURE: C++ Development - Build tools, native libraries, C++ linting/testing
[feature.cpp.dependencies]
cmake = "=3.24"
ninja = "*"
eigen = ">=3.4"
nlohmann_json = ">=3.11"
fmt = ">=9.1"
gtest = "*"
gmock = "*"
onnxruntime-cpp = ">=1.15"
gcc_linux-64 = "*"
gxx_linux-64 = "*"
libstdcxx-ng = "*"
clang-format = "*"

[feature.cpp.tasks]
# C++ build and testing
configure = "cmake -S control -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_MODULE_PATH=$PIXI_PROJECT_ROOT/cmake"
build = "cmake --build build"
test-cpp = "ctest --test-dir build --output-on-failure"
test = { depends-on = ["test-cpp"] }

# C++ formatting and linting
format-cpp = "find control -name '*.cpp' -o -name '*.hpp' | xargs clang-format -i"
format-cpp-check = "find control -name '*.cpp' -o -name '*.hpp' | xargs clang-format --dry-run --Werror"
format = { depends-on = ["format-cpp"] }
format-check = { depends-on = ["format-python-check", "format-cpp-check"] }
check = { depends-on = ["format-check"] }

# C++ setup
setup = { depends-on = ["configure"] }

[feature.core.dependencies]
pytest = "*"

[feature.core.pypi-dependencies]
exploy-exporter-core = { path = "./exploy/exporter/core", editable = true }
pytest-gitignore = "*"

[feature.core.tasks]
test-python = "PYTHONPATH=$PIXI_PROJECT_ROOT:$PYTHONPATH pytest -s $PIXI_PROJECT_ROOT/exploy/exporter/core"
test = { depends-on = ["test-python"] }

[feature.isaaclab.dependencies]
python = "3.11.*"
# Pinning due to isaacsim/isaaclab requirements
typing-extensions = "4.12.2.*"
pillow = "11.3.*"
packaging = "23.0.*"
# OpenGL and X11 support for headless rendering
mesalib = "*"
xorg-libxt = "*"
libglu = "*"

[feature.isaaclab.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]

[feature.isaaclab.pypi-dependencies]
exploy-frameworks-isaaclab = { path = "./exploy/exporter/frameworks/isaaclab", editable = true }
isaaclab = { version = ">=2,<3", extras = ["all"] }
isaacsim = { extras = ["all", "extscache"], version = ">=5,<6" }

[feature.isaaclab.tasks]
export-isaaclab-g1 = "python examples/exporter_scripts/isaaclab/export_isaaclab.py --task Isaac-Velocity-Rough-G1-Play-v0 --pause-on-failure"
export-isaaclab-g1-rnn = "python examples/exporter_scripts/isaaclab/export_isaaclab.py --task Exploy-Velocity-Flat-G1-RNN-Play-v0 --pause-on-failure"
export-isaaclab-anymal = "python examples/exporter_scripts/isaaclab/export_isaaclab.py --task Isaac-Velocity-Rough-Anymal-C-Play-v0 --pause-on-failure"
export-isaaclab = { depends-on = ["export-isaaclab-g1"] }
export-isaaclab-ci = "python examples/exporter_scripts/isaaclab/export_isaaclab.py --task Isaac-Velocity-Rough-G1-Play-v0"
test-import = "python -c \"import isaaclab; print('Isaac Lab installed:', isaaclab.__file__)\""
test-torch = "python -c \"import torch; print('CUDA available:', torch.cuda.is_available())\""
test-python = "PYTHONPATH=$PIXI_PROJECT_ROOT:$PYTHONPATH pytest -s $PIXI_PROJECT_ROOT/exploy/exporter/frameworks/isaaclab/tests"
test = { depends-on = ["test-python", "verify"] }
verify = { depends-on = ["test-import", "test-torch"] }

# FEATURE: Documentation - Sphinx documentation building
[feature.docs.dependencies]
python = "3.11.*"
sphinx = "*"
sphinx_rtd_theme = "*"
sphinx-autodoc-typehints = "*"
doxygen = "*"
breathe = "*"
myst-parser = "*"

[feature.docs.pypi-dependencies]
exploy-exporter-core = { path = "./exploy/exporter/core", editable = true }
exploy-frameworks-isaaclab = { path = "./exploy/exporter/frameworks/isaaclab", editable = true }

[feature.docs.tasks]
doxygen = "mkdir -p docs/_build/doxygen && doxygen Doxyfile"
build = { cmd = "sphinx-build -b html docs docs/_build/html", depends-on = [
  "doxygen",
] }
clean = "rm -rf docs/_build"
open = "xdg-open docs/_build/html/index.html || open docs/_build/html/index.html"

# ENVIRONMENTS
[environments]
python = ["python"]             # Python-only development
cpp = ["cpp"]                   # C++-only development
core = ["python", "core"]       # Exporter environment: Python + core functionality
isaaclab = ["isaaclab", "core"] # Isaac Lab + core exporter functionality
controller = ["python", "cpp"]  # Controller environment: Python + C++
docs = ["docs"]                 # Documentation building

# Available across all environments
[tasks]
help = '''echo "Available environments:
  pixi run -e python <task>     - Python development only
  pixi run -e cpp <task>        - C++ development only
  pixi run -e exploy <task>     - Python + Isaac Lab (model export)
  pixi run -e controller <task> - Python + C++ (controller dev)
  pixi run -e docs <task>       - Documentation building

Feature-specific tasks:
  Python: test, lint, format, check, docs
  C++: build, test, format, check
  Isaac Lab: isaac-sim, export-isaaclab, lab-*

Common workflows:
  pixi run -e docs build        - Build documentation
  pixi run -e docs open         - Open documentation
  pixi install -e controller    - Install controller environment
  pixi run -e controller setup  - Setup controller development
  pixi run -e controller build  - Build C++ code
  pixi run -e controller test   - Test both Python and C++
  pixi run -e exploy setup      - Setup exporter with Isaac Lab"'''

clean = "rm -rf build .pixi pixi.lock"
